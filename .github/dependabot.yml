version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      types:
        patterns:
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      vue-ecosystem:
        patterns:
          - '@vue/*'
          - 'vue'
          - 'vue-*'
        update-types:
          - 'minor'
          - 'patch'
      build-tools:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
        update-types:
          - 'minor'
          - 'patch'
      linting-or-testing-tools:
        patterns:
          - '@vitest/*'
          - 'vitest'
          - 'eslint'
          - 'eslint-*'
          - 'oxlint'
          - 'prettier'
      all:
        patterns:
          - '*'
