name: test

on:
  pull_request:

jobs:
  test:
    environment:
      name: Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm run test:unit
